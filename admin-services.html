<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Services - Camotes Island Barbers</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .admin-nav {
            background: var(--bg-card);
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
            margin-top: 80px;
        }

        .admin-nav .container {
            display: flex;
            gap: 1rem;
        }

        .admin-nav a {
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .admin-nav a:hover,
        .admin-nav a.active {
            background: var(--primary);
            color: var(--bg-dark);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">Camotes Admin.</div>
                <div class="auth-links">
                    <button class="btn btn-outline" onclick="logout()">Logout</button>
                </div>
            </nav>
        </div>
    </header>

    <div class="admin-nav">
        <div class="container">
            <a href="admin.html">Appointments</a>
            <a href="admin-services.html" class="active">Services</a>
            <a href="admin-barbers.html">Barbers</a>
            <a href="admin-customers.html">Customers</a>
        </div>
    </div>

    <div class="dashboard-container container" style="margin-top: 2rem;">
        <div id="services" style="width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2>Manage Services</h2>
                <button class="btn btn-primary"
                    onclick="document.getElementById('add-service-form').style.display='block'">+ Add Service</button>
            </div>

            <div id="add-service-form"
                style="display:none; background: var(--bg-card); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--primary);">
                <h3>New Service</h3>
                <form onsubmit="addService(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Service Name</label>
                            <input type="text" id="s-name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Price (₱)</label>
                            <input type="number" step="0.01" id="s-price" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Duration (e.g., 45 min)</label>
                        <input type="text" id="s-duration" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Image URL (Optional)</label>
                        <input type="text" id="s-image" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary">Save Service</button>
                    <button type="button" class="btn btn-outline"
                        onclick="document.getElementById('add-service-form').style.display='none'">Cancel</button>
                </form>
            </div>

            <div class="grid" id="admin-services-list"></div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/admin.js"></script>
    <script>
        // No localized overrides needed here anymore. 
        // admin.js handles renderAdminDashboard and deleteService automatically.
    </script>
</body>

</html>
