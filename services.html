<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Camotes Island Barbers</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">Camotes Barbers.</div>
                <ul class="nav-links" id="mobile-nav">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html" class="active" style="color: var(--primary);">Services</a></li>
                    <li><a href="barbers.html">Barbers</a></li>
                    <li><a href="booking.html">Book Appointment</a></li>
                </ul>
                <div style="display:flex;align-items:center;gap:1rem;">
                    <div class="auth-links" id="auth-links"></div>
                    <button class="hamburger" onclick="document.getElementById('mobile-nav').classList.toggle('open')" aria-label="Menu">
                        <span></span><span></span><span></span>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <div class="container" style="padding-top: 120px; padding-bottom: 50px;">
        <h1 class="section-title">Our Services</h1>
        <p style="text-align: center; color: var(--text-muted); max-width: 600px; margin: 0 auto 3rem;">Premium grooming
            services tailored for the modern gentleman.</p>

        <div class="grid" id="services-container">
            <!-- Populated by JS -->
        </div>
    </div>

    <footer>
        <div class="container">
            <p style="color: #666;">&copy; 2026 Camotes Island Barbers.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const services = await getServices();
            const container = document.getElementById('services-container');
            container.innerHTML = services.map(service => `
                <div class="card">
                    <img src="${service.image || 'https://images.unsplash.com/photo-1585747860715-2ba37e788b70?auto=format&fit=crop&w=400&q=80'}" alt="${service.service_name}" style="width:100%; height:220px; object-fit:cover;">
                    <div class="card-content">
                        <div class="card-title">${service.service_name}</div>
                        <div class="card-price">₱${parseFloat(service.price).toFixed(2)} &bull; ${service.duration}</div>
                        <p style="color: var(--text-muted); margin-bottom: 1rem;">${service.description || ''}</p>
                        <a href="booking.html?service=${service.service_id}" class="btn btn-outline">Book This Service</a>
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>

</html>
